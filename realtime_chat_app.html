
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--bg2:#161B27;--bg3:#1E2535;--bg4:#252D40;
  --border:#252D3E;--border2:#2E3850;
  --accent:#4F7EF7;--accent-dim:#1E2E5C;--accent-text:#A5BEFF;
  --green:#3DBA6C;--red:#E24B4A;--amber:#EF9F27;
  --text:#E8EAF0;--text2:#8892A4;--text3:#4A5268;
  --me-bg:#1E2E5C;--me-text:#C5D4FF;
  --them-bg:#1E2535;--them-text:#E8EAF0;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px}

.app{display:grid;grid-template-columns:260px 1fr;height:680px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--bg)}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:15px;font-weight:500;color:var(--text)}
.header-actions{display:flex;gap:8px}
.icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:14px;transition:background .2s}
.icon-btn:hover{background:var(--bg4);color:var(--text)}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:none}
.search-input::placeholder{color:var(--text3)}
.section-label{padding:10px 14px 4px;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-weight:500}
.contacts-list{flex:1;overflow-y:auto;padding:4px 8px}
.contacts-list::-webkit-scrollbar{width:3px}
.contacts-list::-webkit-scrollbar-track{background:transparent}
.contacts-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.contact-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;cursor:pointer;transition:background .15s}
.contact-item:hover{background:var(--bg3)}
.contact-item.active{background:var(--accent-dim)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg2)}
.online-dot.away{background:var(--amber)}
.online-dot.offline{background:var(--text3)}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.contact-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.contact-time{font-size:10px;color:var(--text3)}
.unread-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:500;border-radius:100px;padding:2px 6px;min-width:18px;text-align:center}
.my-profile{padding:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.my-status{font-size:10px;color:var(--green)}

/* CHAT AREA */
.chat-area{display:flex;flex-direction:column;background:var(--bg)}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.chat-header-left{display:flex;align-items:center;gap:10px}
.chat-contact-name{font-size:14px;font-weight:500;color:var(--text)}
.chat-status{font-size:11px;color:var(--green)}
.chat-status.typing{color:var(--accent-text);font-style:italic}
.chat-header-actions{display:flex;gap:6px}
.messages-area{flex:1;padding:16px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.messages-area::-webkit-scrollbar{width:3px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.date-divider{text-align:center;margin:8px 0}
.date-divider span{background:var(--bg3);color:var(--text3);font-size:10px;padding:3px 10px;border-radius:100px;letter-spacing:0.04em}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.me{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.bubble{max-width:72%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word}
.bubble.them{background:var(--them-bg);color:var(--them-text);border-bottom-left-radius:4px}
.bubble.me{background:var(--me-bg);color:var(--me-text);border-bottom-right-radius:4px}
.bubble-meta{font-size:10px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:4px}
.msg-row.me .bubble-meta{justify-content:flex-end}
.tick{color:var(--accent-text);font-size:11px}
.msg-group{display:flex;flex-direction:column;gap:3px}
.msg-group.me{align-items:flex-end}
.msg-group.them{align-items:flex-start}
.typing-bubble{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--them-bg);border-radius:16px;border-bottom-left-radius:4px;width:56px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tdot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.msg-appear{animation:msgIn .2s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* INPUT BAR */
.input-bar{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:10px}
.attach-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;flex-shrink:0;transition:background .2s}
.attach-btn:hover{background:var(--bg4)}
.msg-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 13px;color:var(--text);font-size:13px;outline:none;resize:none;font-family:inherit;line-height:1.4;transition:border-color .2s}
.msg-input:focus{border-color:var(--accent)}
.msg-input::placeholder{color:var(--text3)}
.send-btn{background:var(--accent);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;flex-shrink:0;transition:opacity .2s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.emoji-btn{font-size:16px;cursor:pointer;padding:4px;border-radius:6px;background:none;border:none;color:var(--text2);transition:color .2s}
.emoji-btn:hover{color:var(--text)}

.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3)}
.empty-icon{font-size:40px;opacity:.3}
.empty-text{font-size:13px}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Real-time chat application with contacts sidebar and message area</h2>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="app-title">Messages</span>
      <div class="header-actions">
        <div class="icon-btn" title="New chat">+</div>
        <div class="icon-btn" title="Settings">⚙</div>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" placeholder="Search conversations..." id="search-input" oninput="searchContacts(this.value)"/>
    </div>
    <div class="section-label">Recent</div>
    <div class="contacts-list" id="contacts-list"></div>
    <div class="my-profile">
      <div class="avatar" style="background:#1E3A5C;color:#A5BEFF;width:32px;height:32px;font-size:12px">You</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:500;color:var(--text)">Ali Hassan</div>
        <div class="my-status">● Online</div>
      </div>
      <div class="icon-btn">≡</div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="empty-chat" id="empty-chat">
      <div class="empty-icon">💬</div>
      <div class="empty-text">Select a conversation to start chatting</div>
    </div>
  </div>

</div>

<script>
const contacts = [
  {id:1,name:'Sara Ahmed',initials:'SA',color:'#2D1E5C',textColor:'#C5AFFF',status:'online',preview:'Sounds great! See you then',time:'2m',unread:2,messages:[
    {from:'them',text:'Hey! Are you free this evening?',time:'7:42 PM'},
    {from:'me',text:'Yeah, what\'s up?',time:'7:43 PM'},
    {from:'them',text:'Wanted to discuss the project deadline',time:'7:44 PM'},
    {from:'me',text:'Sure, let\'s catch up at 8?',time:'7:45 PM'},
    {from:'them',text:'Sounds great! See you then',time:'7:46 PM'},
  ]},
  {id:2,name:'Bilal Khan',initials:'BK',color:'#1E3A2D',textColor:'#9FE1CB',status:'online',preview:'I\'ll send you the files now',time:'15m',unread:0,messages:[
    {from:'me',text:'Bilal bhai, files send karo please',time:'7:30 PM'},
    {from:'them',text:'Haan bhai, abhi karta hoon',time:'7:31 PM'},
    {from:'them',text:'I\'ll send you the files now',time:'7:32 PM'},
  ]},
  {id:3,name:'Fatima Malik',initials:'FM',color:'#3A1E2D',textColor:'#F4C0D1',status:'away',preview:'Ok thanks!',time:'1h',unread:0,messages:[
    {from:'them',text:'Can you review my code?',time:'6:10 PM'},
    {from:'me',text:'Sure, send it over',time:'6:12 PM'},
    {from:'them',text:'Ok thanks!',time:'6:12 PM'},
  ]},
  {id:4,name:'Usman Dev',initials:'UD',color:'#1E2D3A',textColor:'#85B7EB',status:'offline',preview:'Let me know when done',time:'3h',unread:1,messages:[
    {from:'them',text:'Bhai deployment ka kya scene hai?',time:'4:00 PM'},
    {from:'me',text:'Almost done, just testing',time:'4:05 PM'},
    {from:'them',text:'Let me know when done',time:'4:06 PM'},
  ]},
  {id:5,name:'Zara Siddiqui',initials:'ZS',color:'#2D2A1E',textColor:'#FAC775',status:'online',preview:'Perfect timing!',time:'Yesterday',unread:0,messages:[
    {from:'me',text:'Meeting at 3pm?',time:'Yesterday'},
    {from:'them',text:'Perfect timing!',time:'Yesterday'},
  ]},
];

const autoReplies = [
  'Bilkul bhai!','Haan ji, sahi baat hai 👍','Ok ok, samajh gaya','Theek hai, dekh leta hoon','Yaar abhi busy hoon, baad mein baat karte hain','Wah! Maza aa gaya 🔥','Acha hua bataya','Shukriya bhai!','Zaroor, koi masla nahi','LOL 😄 sahi kaha','Hmm, sochna padega','Done! Check karo','Abhi nahi, thodi der mein','Great idea!','Paka?? Serious ho?'
];

let activeContact = null;
let typingTimer = null;

function statusColor(s){return s==='online'?'var(--green)':s==='away'?'var(--amber)':'var(--text3)'}

function renderContacts(list){
  const el = document.getElementById('contacts-list');
  el.innerHTML = list.map(c=>`
    <div class="contact-item${activeContact&&activeContact.id===c.id?' active':''}" onclick="openChat(${c.id})">
      <div class="avatar" style="background:${c.color};color:${c.textColor}">
        ${c.initials}
        <div class="online-dot ${c.status}"></div>
      </div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-preview">${c.preview}</div>
      </div>
      <div class="contact-meta">
        <div class="contact-time">${c.time}</div>
        ${c.unread>0?`<div class="unread-badge">${c.unread}</div>`:''}
      </div>
    </div>
  `).join('');
}

function searchContacts(q){
  const filtered = q ? contacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())) : contacts;
  renderContacts(filtered);
}

function openChat(id){
  activeContact = contacts.find(c=>c.id===id);
  activeContact.unread = 0;
  renderContacts(contacts);
  renderChatArea();
}

function renderChatArea(){
  const area = document.getElementById('chat-area');
  if(!activeContact){
    area.innerHTML=`<div class="empty-chat" id="empty-chat"><div class="empty-icon" style="font-size:40px;opacity:.3">💬</div><div class="empty-text">Select a conversation to start chatting</div></div>`;
    return;
  }
  const c = activeContact;
  area.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="avatar" style="background:${c.color};color:${c.textColor};width:34px;height:34px">${c.initials}</div>
        <div>
          <div class="chat-contact-name">${c.name}</div>
          <div class="chat-status" id="chat-status">${c.status==='online'?'● Online':c.status==='away'?'● Away':'● Offline'}</div>
        </div>
      </div>
      <div class="chat-header-actions">
        <div class="icon-btn">📞</div>
        <div class="icon-btn">🎥</div>
        <div class="icon-btn">⋮</div>
      </div>
    </div>
    <div class="messages-area" id="messages-area">
      <div class="date-divider"><span>Today</span></div>
      <div id="messages-inner"></div>
      <div id="typing-indicator" style="display:none">
        <div class="msg-row" style="gap:8px;align-items:flex-end">
          <div class="msg-avatar" style="background:${c.color};color:${c.textColor}">${c.initials[0]}</div>
          <div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <div class="attach-btn" title="Attach">📎</div>
      <button class="emoji-btn" onclick="insertEmoji()">😊</button>
      <textarea class="msg-input" id="msg-input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  `;
  renderMessages();
  scrollToBottom();
}

function renderMessages(){
  const c = activeContact;
  const inner = document.getElementById('messages-inner');
  if(!inner) return;
  inner.innerHTML = '';
  c.messages.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'msg-row '+m.from+' msg-appear';
    div.innerHTML = `
      ${m.from==='them'?`<div class="msg-avatar" style="background:${c.color};color:${c.textColor}">${c.initials[0]}</div>`:''}
      <div class="msg-group ${m.from}">
        <div class="bubble ${m.from}">${m.text}</div>
        <div class="bubble-meta">${m.time}${m.from==='me'?` <span class="tick">✓✓</span>`:''}</div>
      </div>
      ${m.from==='me'?`<div class="msg-avatar" style="background:#1E3A5C;color:#A5BEFF">You</div>`:''}
    `;
    inner.appendChild(div);
  });
}

function sendMessage(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text || !activeContact) return;
  const now = new Date();
  const time = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes()+' '+(now.getHours()<12?'AM':'PM');
  activeContact.messages.push({from:'me',text,time});
  activeContact.preview = text;
  input.value='';
  input.style.height='';
  renderMessages();
  scrollToBottom();
  renderContacts(contacts);
  if(activeContact.status!=='offline') showTyping();
}

function showTyping(){
  const ti = document.getElementById('typing-indicator');
  const cs = document.getElementById('chat-status');
  if(!ti||!cs) return;
  ti.style.display='block';
  cs.className='chat-status typing';
  cs.textContent='typing...';
  scrollToBottom();
  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>{
    ti.style.display='none';
    cs.className='chat-status';
    cs.textContent='● Online';
    const reply = autoReplies[Math.floor(Math.random()*autoReplies.length)];
    const now = new Date();
    const time = now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes()+' '+(now.getHours()<12?'AM':'PM');
    activeContact.messages.push({from:'them',text:reply,time});
    activeContact.preview = reply;
    renderMessages();
    renderContacts(contacts);
    scrollToBottom();
  }, 1400+Math.random()*800);
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,96)+'px';
}

function scrollToBottom(){
  const area = document.getElementById('messages-area');
  if(area) setTimeout(()=>area.scrollTop=area.scrollHeight,50);
}

function insertEmoji(){
  const emojis=['😊','🔥','👍','❤️','😂','🙏','✨','💯','😎','🎉'];
  const el = document.getElementById('msg-input');
  if(el) el.value += emojis[Math.floor(Math.random()*emojis.length)];
}

renderContacts(contacts);
</script>
